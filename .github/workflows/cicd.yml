name: DevHub 2.0 DevSecOps Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

concurrency:
  group: devhub-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "20"

  BACKEND_IMAGE: kartavyanirwel/devhub-backend
  FRONTEND_IMAGE: kartavyanirwel/devhub-frontend

##############################################################
######################## SECURITY #############################
##############################################################

jobs:

##############################################################
########################## LINT ###############################
##############################################################

  security:

    name: 🔍 Lint + Security Scan

    runs-on: ubuntu-latest

    steps:

      ########################################################
      ## Checkout
      ########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ########################################################
      ## Java
      ########################################################

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      ########################################################
      ## Node
      ########################################################

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      ########################################################
      ## Install Frontend Packages
      ########################################################

      - name: Install Frontend Packages
        working-directory: frontend
        run: npm ci

      ########################################################
      ## Hadolint Backend
      ########################################################

      - name: Scan Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      ########################################################
      ## Hadolint Frontend
      ########################################################

      - name: Scan Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      ########################################################
      ## Oxlint
      ########################################################

      - name: Run Oxlint
        working-directory: frontend
        run: npm run lint

      ########################################################
      ## npm Audit
      ########################################################

      - name: npm Audit
        working-directory: frontend
        run: npm audit --audit-level=high

      ########################################################
      ## Maven Dependency Check
      ########################################################

      - name: OWASP Dependency Check
        working-directory: backend
        run: |
          mvn \
          org.owasp:dependency-check-maven:check

      ########################################################
      ## Checkov Terraform
      ########################################################

      - name: Terraform Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform

      ########################################################
      ## Checkov Kubernetes
      ########################################################

      - name: Kubernetes Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/manifests

##############################################################
########################## BUILD ##############################
##############################################################

  build:

    name: 🏗 Build Application

    runs-on: ubuntu-latest

    needs: security

    steps:

      ########################################################
      ## Checkout
      ########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ########################################################
      ## Java Setup
      ########################################################

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      ########################################################
      ## Node Setup
      ########################################################

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      ########################################################
      ## Build Backend
      ########################################################

      - name: Build Spring Boot
        working-directory: backend
        run: mvn clean package -DskipTests

      ########################################################
      ## Install Frontend Dependencies
      ########################################################

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      ########################################################
      ## Build React
      ########################################################

      - name: Build React Application
        working-directory: frontend
        run: npm run build

      ########################################################
      ## Upload Backend Artifact
      ########################################################

      - name: Upload Backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

      ########################################################
      ## Upload Frontend Artifact
      ########################################################

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

##############################################################
###################### DOCKER + TRIVY #########################
##############################################################

  docker:

    name: 🐳 Docker Build & Trivy Scan

    runs-on: ubuntu-latest

    needs: build

    steps:

      ########################################################
      ## Checkout
      ########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ########################################################
      ## Docker Buildx
      ########################################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      ########################################################
      ## Build Backend Image
      ########################################################

      - name: Build Backend Image
        run: |
          docker build \
            -t $BACKEND_IMAGE:${{ github.sha }} \
            -t $BACKEND_IMAGE:latest \
            backend

      ########################################################
      ## Build Frontend Image
      ########################################################

      - name: Build Frontend Image
        run: |
          docker build \
            -t $FRONTEND_IMAGE:${{ github.sha }} \
            -t $FRONTEND_IMAGE:latest \
            frontend

      ########################################################
      ## Trivy Backend Scan
      ########################################################

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      ########################################################
      ## Trivy Frontend Scan
      ########################################################

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

##############################################################
######################## GITLEAKS #############################
##############################################################

  gitleaks:

    name: 🔐 Secret Scan

    runs-on: ubuntu-latest

    needs: docker

    steps:

      ########################################################
      ## Checkout
      ########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ########################################################
      ## Run Gitleaks
      ########################################################

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

##############################################################
###################### DOCKER PUSH ############################
##############################################################

  push-images:

    name: 🚀 Push Docker Images

    runs-on: ubuntu-latest

    needs: gitleaks

    if: github.event_name == 'push'

    steps:

      ########################################################
      ## Checkout
      ########################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ########################################################
      ## Docker Login
      ########################################################

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      ########################################################
      ## Setup Buildx
      ########################################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      ########################################################
      ## Build & Push Backend
      ########################################################

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      ########################################################
      ## Build & Push Frontend
      ########################################################

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      ########################################################
      ## Job Summary
      ########################################################

      - name: Pipeline Summary
        run: |
          {
            echo "## ✅ DevHub 2.0 DevSecOps Pipeline"
            echo ""
            echo "| Stage | Status |"
            echo "|-------|--------|"
            echo "| Hadolint | ✅ |"
            echo "| Oxlint | ✅ |"
            echo "| npm audit | ✅ |"
            echo "| OWASP Dependency Check | ✅ |"
            echo "| Checkov | ✅ |"
            echo "| Spring Boot Build | ✅ |"
            echo "| React Build | ✅ |"
            echo "| Docker Build | ✅ |"
            echo "| Trivy Scan | ✅ |"
            echo "| Gitleaks | ✅ |"
            echo "| Docker Push | ✅ |"
            echo ""
            echo "### Images"
            echo "- $BACKEND_IMAGE:${{ github.sha }}"
            echo "- $FRONTEND_IMAGE:${{ github.sha }}"
          } >> $GITHUB_STEP_SUMMARY

##############################################################
##################### OPTIONAL IMPROVEMENTS ##################
##############################################################

# Add these permissions at the top if you later enable
# GitHub Security SARIF uploads.

permissions:
  contents: read
  security-events: write
  actions: read

##############################################################
#################### RETENTION SETTINGS ######################
##############################################################

# Wherever you use upload-artifact, add:

retention-days: 7

##############################################################
##################### BUILDX CACHE ###########################
##############################################################

# Replace your Docker Build step with this if you want
# Docker layer caching.

- name: Set up Docker Buildx
  uses: docker/setup-buildx-action@v3

- name: Build Backend Image
  uses: docker/build-push-action@v6
  with:
    context: backend
    file: backend/Dockerfile
    push: false
    tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
    cache-from: type=gha
    cache-to: type=gha,mode=max

- name: Build Frontend Image
  uses: docker/build-push-action@v6
  with:
    context: frontend
    file: frontend/Dockerfile
    push: false
    tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
    cache-from: type=gha
    cache-to: type=gha,mode=max

##############################################################
##################### MAVEN CACHE ############################
##############################################################

- name: Setup Java
  uses: actions/setup-java@v4
  with:
    distribution: temurin
    java-version: 21
    cache: maven

##############################################################
###################### NODE CACHE ############################
##############################################################

- name: Setup Node
  uses: actions/setup-node@v4
  with:
    node-version: 20
    cache: npm
    cache-dependency-path: frontend/package-lock.json

##############################################################
#################### PIPELINE SUMMARY ########################
##############################################################

- name: Final Summary
  run: |
    {
      echo "# 🚀 DevHub 2.0 Pipeline"
      echo ""
      echo "## Completed Stages"
      echo "- ✅ Hadolint"
      echo "- ✅ Oxlint"
      echo "- ✅ npm audit"
      echo "- ✅ OWASP Dependency Check"
      echo "- ✅ Checkov"
      echo "- ✅ Spring Boot Build"
      echo "- ✅ React Build"
      echo "- ✅ Docker Build"
      echo "- ✅ Trivy"
      echo "- ✅ Gitleaks"
      echo "- ✅ Docker Push"
      echo ""
      echo "Commit: ${{ github.sha }}"
      echo "Branch: ${{ github.ref_name }}"
      echo "Triggered By: ${{ github.actor }}"
    } >> $GITHUB_STEP_SUMMARY