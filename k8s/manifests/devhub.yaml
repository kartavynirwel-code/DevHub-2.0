# =========================================================================
# DevHub 2.0 - Kubernetes Deployment Manifest
# Apply with: kubectl apply -f devhub.yaml
# =========================================================================

# -------------------------------------------------------------------------
# Namespace
# -------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: devhub

---
# -------------------------------------------------------------------------
# Secrets - REPLACE these placeholder values before applying.
# Generate base64 with: echo -n "yourvalue" | base64
# -------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: devhub-secrets
  namespace: devhub
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: Y2hhbmdlbWUxMjM=   # changeme123
  MYSQL_DATABASE: ZGV2aHViX2Ri              # devhub_db
  MYSQL_USER: ZGV2aHVidXNlcg==              # devhubuser
  MYSQL_PASSWORD: Y2hhbmdlbWUxMjM=          # changeme123
  JWT_SECRET: Y2hhbmdlLXRoaXMtand0LXNlY3JldC1pbi1wcm9k # change-this-jwt-secret-in-prod

---
# -------------------------------------------------------------------------
# StorageClass - gp3 EBS volumes for MySQL persistence
# -------------------------------------------------------------------------
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
parameters:
  type: gp3

---
# -------------------------------------------------------------------------
# MySQL - PVC
# -------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: devhub
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 5Gi

---
# -------------------------------------------------------------------------
# MySQL - Deployment
# -------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: devhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: { name: devhub-secrets, key: MYSQL_ROOT_PASSWORD }
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef: { name: devhub-secrets, key: MYSQL_DATABASE }
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef: { name: devhub-secrets, key: MYSQL_USER }
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef: { name: devhub-secrets, key: MYSQL_PASSWORD }
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "500m", memory: "1Gi" }
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: devhub
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None   # headless - backend connects directly to the pod

---
# -------------------------------------------------------------------------
# Backend - Spring Boot REST API
# REPLACE image with your actual registry path (e.g. ECR or Docker Hub)
# -------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devhub-backend
  namespace: devhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devhub-backend
  template:
    metadata:
      labels:
        app: devhub-backend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: backend
          image: kartavyanirwel/devhub-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql.devhub.svc.cluster.local:3306/devhub_db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef: { name: devhub-secrets, key: MYSQL_USER }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef: { name: devhub-secrets, key: MYSQL_PASSWORD }
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: devhub-secrets, key: JWT_SECRET }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "500m", memory: "1Gi" }

---
apiVersion: v1
kind: Service
metadata:
  name: devhub-backend
  namespace: devhub
spec:
  selector:
    app: devhub-backend
  ports:
    - port: 8080
      targetPort: 8080

---
# -------------------------------------------------------------------------
# Frontend - React SPA via Nginx
# REPLACE image with your actual registry path
# -------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devhub-frontend
  namespace: devhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devhub-frontend
  template:
    metadata:
      labels:
        app: devhub-frontend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: kartavyanirwel/devhub-frontend:latest
          ports:
            - containerPort: 8080
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "250m", memory: "256Mi" }

---
apiVersion: v1
kind: Service
metadata:
  name: devhub-frontend
  namespace: devhub
spec:
  type: ClusterIP   # use port-forward to access; switch to LoadBalancer if you want a public URL
  selector:
    app: devhub-frontend
  ports:
    - port: 80
      targetPort: 8080

---
# -------------------------------------------------------------------------
# NetworkPolicy - MySQL only accepts traffic from backend
# -------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysql-allow-backend-only
  namespace: devhub
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: devhub-backend
      ports:
        - protocol: TCP
          port: 3306

---
# -------------------------------------------------------------------------
# NetworkPolicy - Backend only accepts traffic from frontend
# -------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow-frontend-only
  namespace: devhub
spec:
  podSelector:
    matchLabels:
      app: devhub-backend
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: devhub-frontend
      ports:
        - protocol: TCP
          port: 8080
